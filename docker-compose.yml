services:
  # ---------- Base de datos (contenedor independiente) ----------
  db:
    image: pgvector/pgvector:pg16
    container_name: gdp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - gdp_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------- Gateway ----------
  gateway:
    image: nginx:alpine
    container_name: gdp_gateway
    depends_on:
      - create-person
      - update-person
      - delete-person
      - log-service
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - media:/usr/share/nginx/media:ro
    ports:
      - "8080:80"
    networks:
      - gdp_net

  # ---------- Microservicios (uno por opción del menú) ----------
  create-person:
    build:
      context: .
      dockerfile: services/create-person/Dockerfile
    container_name: gdp_create
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    networks: [gdp_net]

  update-person:
    build:
      context: .
      dockerfile: services/update-person/Dockerfile
    container_name: gdp_update
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media:/app/media
    networks: [gdp_net]

  # Servicio de CONSULTA en contenedor independiente.
  # Se puede habilitar/deshabilitar con: docker compose stop/start query-person
  query-person:
    build:
      context: .
      dockerfile: services/query-person/Dockerfile
    container_name: gdp_query
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    networks: [gdp_net]

  delete-person:
    build:
      context: .
      dockerfile: services/delete-person/Dockerfile
    container_name: gdp_delete
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media:/app/media
    networks: [gdp_net]

  log-service:
    build:
      context: .
      dockerfile: services/log-service/Dockerfile
    container_name: gdp_log
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    networks: [gdp_net]

  # ---------- n8n (RAG + lenguaje natural) ----------
  n8n:
    image: n8nio/n8n:latest
    container_name: gdp_n8n
    restart: unless-stopped
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=${N8N_PORT}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/workflows:ro
    networks:
      - gdp_net

  # ---------- Adminer (opcional, para ver la DB) ----------
  adminer:
    image: adminer
    container_name: gdp_adminer
    ports:
      - "8081:8080"
    networks: [gdp_net]

volumes:
  pgdata:
  n8n_data:
  media:

networks:
  gdp_net:
    driver: bridge
